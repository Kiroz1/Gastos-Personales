<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

<title>Gastos Personales</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow">

<div class="card-header bg-dark text-white">
<h3 class="mb-0">Gestión de Gastos</h3>
</div>

<div class="card-body">

<a href="/nuevo" class="btn btn-primary mb-3">
Nuevo Gasto
</a>

<table class="table table-striped table-hover">

<thead class="table-dark">

<tr>
<th>Descripción</th>
<th>Categoría</th>
<th>Monto</th>
<th>Fecha</th>
<th>Acciones</th>
</tr>

</thead>

<tbody>

<tr th:each="gasto : ${gastos}">

<td th:text="${gasto.descripcion}"></td>
<td th:text="${gasto.categoria}"></td>
<td th:text="${gasto.monto}"></td>
<td th:text="${gasto.fecha}"></td>

<td>

<a th:href="@{/editar/{id}(id=${gasto.id})}" class="btn btn-warning btn-sm">
Editar
</a>

<a th:href="@{/eliminar/{id}(id=${gasto.id})}" class="btn btn-danger btn-sm">
Eliminar
</a>

</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>

</body>
</html>
