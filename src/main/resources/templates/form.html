<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Registrar Gasto</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow">

<div class="card-header bg-primary text-white">
<h3>Registrar Gasto</h3>
</div>

<div class="card-body">

<form th:action="@{/guardar}" th:object="${gasto}" method="post">

<input type="hidden" th:field="*{id}">

<div class="mb-3">

<label class="form-label">Descripción</label>

<input type="text" class="form-control" th:field="*{descripcion}" required>

</div>

<div class="mb-3">

<label class="form-label">Categoría</label>

<input type="text" class="form-control" th:field="*{categoria}" required>

</div>

<div class="mb-3">

<label class="form-label">Monto</label>

<input type="number" step="0.01" class="form-control" th:field="*{monto}" required>

</div>

<div class="mb-3">

<label class="form-label">Fecha</label>

<input type="date" class="form-control" th:field="*{fecha}" required>

</div>

<button type="submit" class="btn btn-success">
Guardar
</button>

<a href="/" class="btn btn-secondary">
Cancelar
</a>

</form>

</div>

</div>

</div>

</body>
</html>
